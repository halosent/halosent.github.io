  <circle cx="90" cy="60" r="240" fill="url(#glowL)"/>
  <circle cx="1140" cy="590" r="280" fill="url(#glowR)"/>

  <circle cx="230" cy="315" r="170" fill="none" stroke="#a9812f" stroke-width="1" opacity="0.22"/>
